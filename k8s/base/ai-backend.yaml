# ============================================================
# AI Backend – Deployment + Service + HPA
# GPU/CPU kaynak yönetimi dahil
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-backend
  namespace: nl2sql
  labels:
    app.kubernetes.io/name: ai-backend
    app.kubernetes.io/part-of: nl2sql
    app.kubernetes.io/component: ai
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0    # Zero-downtime deployment
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-backend
        app.kubernetes.io/part-of: nl2sql
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # Pod anti-affinity: aynı node'a birden fazla replica koyma
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ai-backend
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 60
      containers:
        - name: ai-backend
          image: ghcr.io/nurol-teknoloji/nl2sql-ai-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
              name: http
          envFrom:
            - configMapRef:
                name: nl2sql-config
          env:
            - name: SERVICE_NAME
              value: "ai-backend"
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nl2sql-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nl2sql-secrets
                  key: REDIS_PASSWORD
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nl2sql-secrets
                  key: OPENAI_API_KEY
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
              # GPU kullanacaksanız aşağıyı aktif edin:
              # nvidia.com/gpu: "1"
          # Startup probe: cold start sırasında container'ı öldürme
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 12   # 30 + (12*10) = 150sn'ye kadar bekle
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]   # Graceful drain
      # GPU node'larında çalıştırmak için:
      # nodeSelector:
      #   accelerator: nvidia-gpu
      # tolerations:
      #   - key: nvidia.com/gpu
      #     operator: Exists
      #     effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: ai-backend-service
  namespace: nl2sql
  labels:
    app.kubernetes.io/name: ai-backend
    app.kubernetes.io/part-of: nl2sql
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ai-backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
---
# ============================================================
# HPA – AI Backend Auto-Scaling
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-backend-hpa
  namespace: nl2sql
  labels:
    app.kubernetes.io/name: ai-backend
    app.kubernetes.io/part-of: nl2sql
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
