# ============================================================
# ConfigMap – Paylaşılan konfigürasyonlar
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nl2sql-config
  namespace: nl2sql
  labels:
    app.kubernetes.io/part-of: nl2sql
data:
  # General
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"

  # Database
  POSTGRES_DB: "nl2sql"
  POSTGRES_USER: "nl2sql_user"
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"

  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"

  # Service URLs (cluster-internal)
  AI_BACKEND_URL: "http://ai-backend-service:8000"
  CORE_BACKEND_URL: "http://core-backend-service:8001"

  # Rate Limiting
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"
  RATE_LIMIT_AI_REQUESTS: "20"
  RATE_LIMIT_AI_WINDOW: "60"

  # Cache TTL (seconds)
  CACHE_DEFAULT_TTL: "3600"
  CACHE_SCHEMA_TTL: "7200"
  CACHE_QUERY_TTL: "1800"

  # Gunicorn (AI Backend)
  AI_WORKERS: "2"
