# ============================================================
# Prometheus Configuration
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "ai-backend"
    static_configs:
      - targets: ["ai-backend:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "core-backend"
    static_configs:
      - targets: ["core-backend:8001"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
    scrape_interval: 30s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]
    scrape_interval: 30s
