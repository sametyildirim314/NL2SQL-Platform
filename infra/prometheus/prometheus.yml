# ============================================================
# Prometheus Configuration
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "ai-backend"
    static_configs:
      - targets: ["ai-backend:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "core-backend"
    static_configs:
      - targets: ["core-backend:8001"]
    metrics_path: /metrics
    scrape_interval: 10s
