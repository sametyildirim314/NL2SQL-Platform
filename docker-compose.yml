# ============================================================
# NL2SQL Platform – Docker Compose (Development & Production)
# Tüm mikroservisleri tek komutla ayağa kaldırır:
#   docker compose up -d --build
# ============================================================

services:
  # ──────────────────────────────────────────────
  # PostgreSQL – Primary Database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nl2sql-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nl2sql}
      POSTGRES_USER: ${POSTGRES_USER:-nl2sql_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nl2sql_user} -d ${POSTGRES_DB:-nl2sql}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - nl2sql-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ──────────────────────────────────────────────
  # Redis – Caching & Rate Limiting
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nl2sql-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 60
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nl2sql-network
    deploy:
      resources:
        limits:
          memory: 300M
          cpus: "0.5"

  # ──────────────────────────────────────────────
  # AI Backend – LangGraph / LLM Service
  # ──────────────────────────────────────────────
  ai-backend:
    build:
      context: ./ai-backend
      dockerfile: Dockerfile
    container_name: nl2sql-ai-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVICE_NAME=ai-backend
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-nl2sql_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nl2sql}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - WORKERS=${AI_WORKERS:-2}
    ports:
      - "${AI_BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - nl2sql-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "1.0"
    # GPU desteği için aşağıyı aktif edin:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ──────────────────────────────────────────────
  # Core Backend – .NET 8 Web API & SQL Validator
  # ──────────────────────────────────────────────
  core-backend:
    build:
      context: ./core-backend
      dockerfile: Dockerfile
    container_name: nl2sql-core-backend
    restart: unless-stopped
    environment:
      # ASP.NET Core
      - ASPNETCORE_ENVIRONMENT=${ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=http://+:8001
      # Connection Strings (appsettings.json üzerinden override)
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-nl2sql};Username=${POSTGRES_USER:-nl2sql_user};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD},abortConnect=false,connectTimeout=5000
      # AI Backend
      - AIBackend__BaseUrl=http://ai-backend:8000
      # JWT
      - Jwt__SecretKey=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - Jwt__Issuer=nl2sql-core-backend
      - Jwt__Audience=nl2sql-frontend
      - Jwt__ExpireMinutes=60
      # CORS
      - Cors__AllowedOrigins__0=http://localhost:3000
      - Cors__AllowedOrigins__1=http://frontend:3000
    ports:
      - "${CORE_BACKEND_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - nl2sql-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  # ──────────────────────────────────────────────
  # Frontend – React SPA + Nginx
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: nl2sql-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      core-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - nl2sql-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  # ──────────────────────────────────────────────
  # Prometheus – Metrics Collection (Opsiyonel)
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: nl2sql-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      ai-backend:
        condition: service_healthy
      core-backend:
        condition: service_healthy
    networks:
      - nl2sql-network
    profiles:
      - monitoring

# ──────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local

# ──────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────
networks:
  nl2sql-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
