name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  docker-compose-smoke:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ensure Docker and Docker Compose are available
        run: |
          set -euo pipefail
          docker --version
          if ! docker compose version >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker-compose-plugin
          fi
          docker compose version

      - name: Prepare environment file
        run: |
          set -euo pipefail
          cp .env.example .env

      - name: Build and start all services
        run: |
          set -euo pipefail
          docker compose up -d --build

      - name: Run smoke test
        run: |
          set -euo pipefail
          chmod +x ./scripts/smoke-test.sh
          ./scripts/smoke-test.sh

      - name: Print container logs
        if: always()
        run: |
          mkdir -p artifacts
          docker compose ps | tee artifacts/docker-compose-ps.txt
          docker compose logs --no-color | tee artifacts/docker-compose-logs.txt

      - name: Tear down stack
        if: always()
        run: |
          docker compose down -v --remove-orphans

      - name: Upload docker compose logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: artifacts/*.txt
          if-no-files-found: warn
