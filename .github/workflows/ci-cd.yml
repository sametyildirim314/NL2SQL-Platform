# ============================================================
# GitHub Actions – CI/CD Pipeline
# Build, Test, Push Images, Deploy to Kubernetes
# ============================================================

name: NL2SQL CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ──────────────────────────────────────────
  # 1. Lint & Test – AI Backend
  # ──────────────────────────────────────────
  test-ai-backend:
    name: "Test AI Backend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff mypy

      - name: Lint (Ruff)
        run: ruff check .
        continue-on-error: true

      # - name: Type Check (mypy)
      #   run: mypy app/ --ignore-missing-imports
      #   continue-on-error: true

      # - name: Run Tests
      #   run: pytest tests/ -v --cov=app --cov-report=xml
      #   env:
      #     OPENAI_API_KEY: "sk-test-key"
      #     DATABASE_URL: "sqlite+aiosqlite:///test.db"
      #     REDIS_URL: "redis://localhost:6379/0"

      # - name: Upload Coverage
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ai-backend-coverage
      #     path: ai-backend/coverage.xml

  # ──────────────────────────────────────────
  # 2. Lint & Test – Core Backend
  # ──────────────────────────────────────────
  test-core-backend:
    name: "Test Core Backend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core-backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nl2sql_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore NL2SQL.CoreBackend.sln

      - name: Build
        run: dotnet build NL2SQL.CoreBackend.sln --no-restore -c Release

      # - name: Run Tests
      #   run: dotnet test NL2SQL.CoreBackend.sln --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage"
      #   env:
      #     ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=nl2sql_test;Username=test_user;Password=test_password"
      #     ConnectionStrings__Redis: "localhost:6379,abortConnect=false"
      #     Jwt__SecretKey: "test-secret-key-for-ci-minimum-32-chars"

  # ──────────────────────────────────────────
  # 3. Build & Push Docker Images
  # ──────────────────────────────────────────
  build-and-push:
    name: "Build & Push Images"
    runs-on: ubuntu-latest
    needs: [test-ai-backend, test-core-backend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    strategy:
      matrix:
        include:
          - service: ai-backend
            context: ./ai-backend
          - service: core-backend
            context: ./core-backend
          - service: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize repository owner (lowercase)
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/${{ matrix.service }}:latest
            ghcr.io/${{ env.REPO_OWNER }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ──────────────────────────────────────────
  # 4-5. Deploy Jobs (geçici olarak devre dışı)
  # Canlı Kubernetes cluster ve KUBECONFIG secret'ları hazır olduğunda
  # deploy-production ve deploy-staging job'ları tekrar açılacaktır.
  # ──────────────────────────────────────────
  # deploy-production:
  #   ...
  #
  # deploy-staging:
  #   ...
